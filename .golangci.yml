# golangci-lint v2 configuration for Dockyard (RFC §17).
# Shipped inside generated projects too, so every Dockyard app inherits this bar.
version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - errorlint
    - sloglint        # enforce log/slog usage conventions
    - gosec
    - copyloopvar
    - unconvert
    - misspell
  settings:
    sloglint:
      no-global: "all"
      context: "scope"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
