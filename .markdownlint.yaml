# markdownlint-cli2 configuration for Dockyard docs.
default: true

# Line length: prose in the RFC and briefs wraps generously; don't fight it.
MD013: false

# Allow inline HTML (tables, details, etc. in design docs).
MD033: false

# First line need not be a top-level heading (briefs carry front-matter-style metadata).
MD041: false

# Permit duplicate headings under different parents (per-phase detail blocks).
MD024:
  siblings_only: true
