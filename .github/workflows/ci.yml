name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CGO_ENABLED: "0"

jobs:
  mirror:
    name: AGENTS.md == CLAUDE.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: diff -q AGENTS.md CLAUDE.md

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

  drift-audit:
    name: drift-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: make drift-audit

  go:
    name: build / vet / test / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: make build
      - run: make vet
      - run: make test
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: false

  preflight:
    name: preflight
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: make preflight
