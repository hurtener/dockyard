name: ci

on:
  push:
    branches: [main]
  pull_request:

# Note: CGO_ENABLED is set per-target in the Makefile, not globally — `make build`
# pins CGO_ENABLED=0 (the shipped binary is CGo-free) while `make test` needs
# CGO_ENABLED=1 for the -race detector. A global override here would break one or
# the other.

jobs:
  mirror:
    name: AGENTS.md == CLAUDE.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: diff -q AGENTS.md CLAUDE.md

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # `!**/node_modules` excludes a nested web/* node_modules too, so the
      # check is identical whether or not frontend deps have been installed.
      - run: npx --yes markdownlint-cli2 "**/*.md" "!**/node_modules"

  drift-audit:
    name: drift-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: make drift-audit

  go:
    name: build / vet / test / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      # Node is required because `make build` depends on `make inspector-bundle`,
      # which runs `vite build` for web/inspector and stages the result into
      # internal/inspector/dist/ so the //go:embed directive picks up the real
      # SPA (remediation R4 B1). Without Node here the build embeds only the
      # .gitkeep anchor and the inspector serves its in-Go placeholder page.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/bridge/package-lock.json
            web/ui/package-lock.json
            web/inspector/package-lock.json
      - run: make build
      - run: make vet
      - run: make test
      # The mechanical AGENTS.md §11 coverage gate (Phase 21.5): produces a
      # per-package coverage profile and fails the build on any package below
      # its band in internal/coveragecheck/coverage.json. A coverage regression
      # is a build failure, not a reviewer's catch.
      - name: coverage gate
        run: make coverage
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: false

  web:
    name: web — frontend type-check + tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/bridge/package-lock.json
            web/ui/package-lock.json
            web/inspector/package-lock.json
      # `make web` installs deps on first run, then runs the frontend gate
      # (svelte-check + tsc + vitest run --coverage). The per-project Vitest
      # coverage.thresholds fail the gate on a frontend coverage regression
      # (Phase 21.5). It no-ops gracefully before web/ lands.
      - run: make web

  preflight:
    name: preflight
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/bridge/package-lock.json
            web/ui/package-lock.json
            web/inspector/package-lock.json
      # preflight runs the per-phase smoke scripts; phase-11 asserts `make web`,
      # phase-22/23 assert the inspector bundle is real (remediation R4 S6).
      - run: make preflight
