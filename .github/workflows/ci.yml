name: ci

on:
  push:
    branches: [main]
  pull_request:

# Note: CGO_ENABLED is set per-target in the Makefile, not globally — `make build`
# pins CGO_ENABLED=0 (the shipped binary is CGo-free) while `make test` needs
# CGO_ENABLED=1 for the -race detector. A global override here would break one or
# the other.

jobs:
  mirror:
    name: AGENTS.md == CLAUDE.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: diff -q AGENTS.md CLAUDE.md

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

  drift-audit:
    name: drift-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: make drift-audit

  go:
    name: build / vet / test / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: make build
      - run: make vet
      - run: make test
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: false

  preflight:
    name: preflight
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: make preflight
