# Example Dockyard manifest — RFC §4.2.
#
# This is the manifest the internal/manifest loader round-trips in its tests:
# load -> validate -> no error. It mirrors the RFC §4.2 reference manifest and
# exercises every block — runtime, tools, apps, and the quality gates.
name: customer-health
title: Customer Health
version: 0.1.0

runtime:
  transports: [stdio, http]      # which deployment modes this app supports
  ui:
    framework: svelte            # V1: svelte only
    # single-file is the default — zero external origins, deny-by-default CSP
    # just works (RFC §7.4). This example uses multi-file precisely because it
    # opts into an external csp.connect origin below; a single-file bundle
    # loads no external origin, so the two are mutually exclusive.
    bundle: multi-file

tools:
  - name: show_customer_health
    description: Show an interactive customer health dashboard for an account.
    input: internal/contracts.ShowCustomerHealthInput
    output: internal/contracts.ShowCustomerHealthOutput
    ui: customer_health          # links to the apps[] entry below
    task_support: optional       # forbidden | optional | required (RFC §8.4)

apps:
  - id: customer_health
    uri: ui://customer-health/main
    entry: web/src/apps/customer-health.svelte
    display_modes: [inline, fullscreen]   # subset of inline|fullscreen|pip
    csp:
      connect: [https://api.company.com]
    visibility: [model, app]

tasks:                            # RFC §8.5 — MCP Tasks lifecycle limits
  # The largest task retention the runtime honours; a longer requested TTL is
  # clamped down. 0 (or omitted) means unlimited retention.
  max_ttl_millis: 3600000          # 1 hour
  # Retention applied to a task whose requestor expressed no TTL preference.
  default_ttl_millis: 900000       # 15 minutes
  # How often the background TTL purge sweep reaps expired tasks. 0 disables it.
  purge_interval_millis: 60000     # 1 minute
  # Cap on non-terminal tasks one authorization context may hold at once.
  max_concurrent_per_requestor: 16

quality:                          # RFC §9.4 — enforced by `dockyard validate`
  require_loading_state: true
  require_empty_state: true
  require_error_state: true
  require_permission_state: true
  require_fixtures: true
  require_contract_tests: true
  require_spec_compliance: true
